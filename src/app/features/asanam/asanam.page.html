<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/asanas-list" routerDirection="back"></ion-back-button>
    </ion-buttons>
    <ion-title>
      <div class="asana-title">
        <span>{{ asanam.asanam_name }}</span>
        <span>
          <ion-icon name="sync-outline"></ion-icon>
          <span class="asana-cycles">
            {{ asanam.no_of_cycles }}
            Cycles
          </span>
        </span>
      </div>
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">asanam</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-card>
    <ion-card-content>
      <ion-segment [value]="selectedTab" (ionChange)="onTabChange($event)">
        <ion-segment-button value="steps" content-id="steps">
          <ion-label>Steps</ion-label>
        </ion-segment-button>
        <ion-segment-button value="video" content-id="video">
          <ion-label>Video</ion-label>
        </ion-segment-button>
      </ion-segment>
      <ion-segment-view>
        <ion-segment-content id="steps">
          <app-asanam-steps [steps]="asanam.steps"></app-asanam-steps>
        </ion-segment-content>
        <ion-segment-content id="video">
          <app-asanam-video [videoUrl]="asanam.asanam_video_url"></app-asanam-video>
        </ion-segment-content>
      </ion-segment-view>
    </ion-card-content>
  </ion-card>

  <app-guided-audio [audioUrl]="asanam.guided_instructions_audio_url"></app-guided-audio>

</ion-content>
